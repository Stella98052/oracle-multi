<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#01696f"/>
<title>2026 占星週計畫</title>
<style>
:root{
  --bg:#f4f2ed;--surface:#fbfaf7;--surface2:#edeae3;--text:#26231b;--muted:#6e6a60;
  --green:#01696f;--green2:#0c4e54;--amber:#b45309;--red:#b91c1c;
  --border:rgba(38,35,27,.13);--r:16px;--shadow:0 8px 32px rgba(38,35,27,.08);
  --font:Inter,system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#131210;--surface:#1c1b18;--surface2:#252420;--text:#ede8dc;--muted:#b0a898;--border:rgba(237,232,220,.11);}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:1200px;margin:0 auto;padding:20px 16px;}
header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 0 20px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.logo{width:40px;height:40px;border-radius:12px;background:var(--green);display:grid;place-items:center;color:#fff;font-size:1.3rem;}
.brand h1{font-size:clamp(1rem,.8rem+1.5vw,1.55rem);line-height:1.2;}
.brand small{display:block;font-size:.82rem;color:var(--muted);}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.week-badge{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:.88rem;font-weight:600;}
.lang-sw{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;}
.lang-sw button{border:0;background:transparent;color:var(--text);padding:8px 14px;border-radius:999px;cursor:pointer;font-size:.88rem;min-width:44px;}
.lang-sw button.on{background:var(--green);color:#fff;}
.banner{border-radius:var(--r);padding:18px 20px;margin-bottom:18px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.banner.mon{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#6ee7b7;}
.banner.sat{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fcd34d;}
.banner.sun{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5;}
.banner.other{background:var(--surface);}
.banner-icon{font-size:1.8rem;flex-shrink:0;line-height:1;}
.banner h2{font-size:1.05rem;margin-bottom:4px;}
.banner p{font-size:.9rem;color:var(--muted);}
.week-progress{display:flex;gap:4px;margin-bottom:16px;align-items:center;}
.day-dot{flex:1;height:7px;border-radius:999px;background:var(--border);}
.day-dot.done{background:var(--green);}
.day-dot.today{background:var(--amber);}
.day-label{font-size:.75rem;color:var(--muted);min-width:28px;text-align:center;}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:12px;padding:4px;overflow-x:auto;}
.tabs button{border:0;background:transparent;color:var(--muted);padding:10px 18px;border-radius:10px;cursor:pointer;white-space:nowrap;font-size:.9rem;transition:all .15s;}
.tabs button.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.area-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.area-btns button{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:.88rem;display:flex;align-items:center;gap:5px;}
.area-btns button.on{background:var(--green);color:#fff;border-color:var(--green);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.area-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.area-icon{font-size:1.5rem;}
.area-title{font-size:1.05rem;font-weight:700;}
.area-subtitle{font-size:.84rem;color:var(--muted);}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:640px){.fields{grid-template-columns:1fr;}}
.field label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.9rem;color:var(--text);font-family:var(--font);resize:vertical;min-height:88px;line-height:1.5;transition:border-color .15s;}
.field textarea:focus{outline:none;border-color:var(--green);}
.field.readonly textarea{opacity:.55;cursor:default;}
.actions-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{border:0;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;font-weight:600;}
.btn-primary{background:var(--green);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5;}
.save-bar{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-size:.88rem;font-weight:600;box-shadow:0 4px 16px rgba(1,105,111,.3);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;}
.save-bar.show{opacity:1;}
.review-q{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:10px;}
.review-q label{font-size:.82rem;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
.review-q textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.9rem;color:var(--text);resize:vertical;min-height:68px;font-family:var(--font);}
.review-q textarea:focus{outline:none;border-color:var(--green);}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.hist-item.current{border-color:var(--green);}
.cur-pill{background:var(--green);color:#fff;border-radius:999px;padding:2px 10px;font-size:.78rem;font-weight:600;margin-left:8px;}
.notif-bar{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.notif-bar button{border:0;background:var(--amber);color:#fff;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;}
.help-text{font-size:.82rem;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <div class="logo">☽</div>
    <div>
      <h1 data-i18n="site.title">2026 占星週計畫</h1>
      <small id="weekLabel"></small>
    </div>
  </div>
  <div class="controls">
    <span class="week-badge" id="todayBadge"></span>
    <div class="lang-sw">
      <button type="button" data-lang="zh-TW" class="on">中文</button>
      <button type="button" data-lang="en">EN</button>
    </div>
  </div>
</header>

<div id="notifBar" class="notif-bar" style="display:none">
  <span id="notifText"></span>
  <button id="notifBtn" onclick="requestNotifPermission()"></button>
</div>

<div id="dayBanner" class="banner other"></div>

<div style="display:flex;gap:6px;margin-bottom:14px;align-items:center;">
  <div class="week-progress" id="weekProgress" style="flex:1"></div>
</div>

<div class="tabs" id="tabs"></div>
<div id="panelContent"></div>
</div>

<div class="save-bar" id="savebar"></div>

<script>

  en:{

    'banner.sat.desc':'Based on what actually happened this week, fill the Saturday feedback column.',
    'banner.sun.title':'Today is Sunday — Catch up on Saturday feedback',
    'banner.sun.desc':'Missed yesterday? Add your feedback now so Monday's predictions auto-update.',
    'banner.other.title':'Week in progress',
    'banner.other.desc':'Update midweek observations anytime. Fill feedback on Saturday evening.',
    'tab.checklist':'Weekly Plan',
    'tab.review':'Sat Review',
    'tab.history':'History',
    'field.prediction':'Weekly focus & prediction',
    'field.actions':'Action checklist (Mon–Sun)',
    'field.midweek':'Midweek observation',
    'field.feedback':'Saturday feedback (actual vs predicted)',
    'field.revision':'Revision note for next week',
    'review.q1':'What matched the prediction most this week?',
    'review.q2':'What was most unexpected?',
    'review.q3':'Did the forecast change any decision you made?',
    'review.q4':'What behavior or mindset will you adjust next week?',
    'area.work.title':'Work & Job Search','area.work.sub':'Applications, interviews, networking',
    'area.school.title':'Dual-degree App.','area.school.sub':'Documents, oral exam, announcements',
    'area.family.title':'Mother & Family','area.family.sub':'Mother's health, family interaction',
    'area.health.title':'Health','area.health.sub':'Sleep, diet, exercise, mood',
    'area.travel.title':'Transport & Travel','area.travel.sub':'Commute, travel planning',
    'area.finance.title':'Finance','area.finance.sub':'Income, expenses, savings',
    'area.spirit.title':'Meditation & Tzu Chi','area.spirit.sub':'DDM, Tzu Chi training, meditation',
    'area.notes.title':'Special Notes','area.notes.sub':'Risk reminders and coping strategies',
    'history.empty':'No past weekly records yet.',
    'day.mon':'Mon','day.tue':'Tue','day.wed':'Wed','day.thu':'Thu',
    'day.fri':'Fri','day.sat':'Sat','day.sun':'Sun',
    'cur.label':'Current',
    'readonly.mon':'Fill this on Monday or before',
    'readonly.sat':'Available on Saturday or Sunday',
    'help.autosave':'All inputs are auto-saved in your browser.',
    'hist.areas.filled':'areas filled',
  }
};

function mapLocale(s){const v=String(s||'').toLowerCase();if(v.startsWith('zh'))return'zh-TW';if(v.startsWith('en'))return'en';return null;}
function readCookie(n){const m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
function writeCookie(n,v){document.cookie=n+'='+encodeURIComponent(v)+'; max-age=31536000; path=/; SameSite=Lax';}
function detectLocale(){const langs=navigator.languages?.length?navigator.languages:[navigator.language];for(const l of langs){const m=mapLocale(l);if(m)return m;}return'zh-TW';}
function getLocale(){return mapLocale(new URLSearchParams(location.search).get('lang'))||mapLocale(readCookie('site_lang'))||detectLocale();}

let lang=getLocale();
function t(k){return(T[lang]&&T[lang][k])||(T['zh-TW']&&T['zh-TW'][k])||k;}
function applyLang(l,manual=false){
  lang=T[l]?l:'zh-TW';
  document.documentElement.lang=lang;
  if(manual)writeCookie('site_lang',lang);
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(T[lang][k])el.textContent=T[lang][k];});
  renderAll();
}
document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang,true)));

// Date helpers
function getMonday(d){const x=new Date(d);const day=x.getDay();const diff=x.getDate()-(day===0?6:day-1);x.setDate(diff);x.setHours(0,0,0,0);return x;}
function fmtDate(d){return d.toLocaleDateString(lang,{month:'short',day:'numeric'});}
function weekKey(mon){return'week_'+mon.toISOString().slice(0,10);}

const TODAY=new Date();
const DOW=TODAY.getDay();
const MONDAY=getMonday(TODAY);
const WKEY=weekKey(MONDAY);

const AREAS=['work','school','family','health','travel','finance','spirit','notes'];
const ICONS={work:'💼',school:'🎓',family:'🏠',health:'🌿',travel:'✈️',finance:'💰',spirit:'🙏',notes:'⚠️'};
const DAY_KEYS=['day.sun','day.mon','day.tue','day.wed','day.thu','day.fri','day.sat'];

function loadWeek(key){try{return JSON.parse(localStorage.getItem(key)||'{}')}catch{return{}}}
function saveWeek(key,data){localStorage.setItem(key,JSON.stringify(data));showSaveBar();}
function showSaveBar(){const b=document.getElementById('savebar');b.textContent=t('ui.saved');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1800);}

let weekData=loadWeek(WKEY);
function fieldVal(area,field){return(weekData[area]&&weekData[area][field])||'';}
function setField(area,field,val){if(!weekData[area])weekData[area]={};weekData[area][field]=val;saveWeek(WKEY,weekData);}

let activeTab='checklist';
let activeArea=AREAS[0];

function renderAll(){renderNotifBar();renderBanner();renderWeekLabel();renderProgress();renderTabs();renderPanel();}

function renderWeekLabel(){
  const sun=new Date(MONDAY);sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent=fmtDate(MONDAY)+' – '+fmtDate(sun);
  document.getElementById('todayBadge').textContent=TODAY.toLocaleDateString(lang,{month:'short',day:'numeric',weekday:'short'});
}

function renderBanner(){
  const b=document.getElementById('dayBanner');
  let cls,icon,title,desc;
  if(DOW===1){cls='mon';icon='🌟';title=t('banner.mon.title');desc=t('banner.mon.desc');}
  else if(DOW===6){cls='sat';icon='📝';title=t('banner.sat.title');desc=t('banner.sat.desc');}
  else if(DOW===0){cls='sun';icon='🔄';title=t('banner.sun.title');desc=t('banner.sun.desc');}
  else{cls='other';icon='📅';title=t('banner.other.title');desc=t('banner.other.desc');}
  b.className='banner '+cls;
  b.innerHTML=`<div class="banner-icon">${icon}</div><div><h2>${title}</h2><p>${desc}</p></div>`;
}

function renderProgress(){
  const p=document.getElementById('weekProgress');
  const days=7;
  const elapsed=DOW===0?7:DOW;
  const labels=['day.mon','day.tue','day.wed','day.thu','day.fri','day.sat','day.sun'];
  p.innerHTML=labels.map((lk,i)=>{
    let cls='day-dot';
    if(i+1<elapsed)cls+=' done';
    else if(i+1===elapsed&&DOW!==0)cls+=' today';
    else if(DOW===0&&i===6)cls+=' today';
    return`<div style="text-align:center;flex:1"><div class="${cls}"></div><div class="day-label">${t(lk)}</div></div>`;
  }).join('');
}

function renderNotifBar(){
  const nb=document.getElementById('notifBar');
  if('Notification' in window&&Notification.permission==='default'){
    nb.style.display='flex';
    document.getElementById('notifText').textContent=t('notif.text');
    document.getElementById('notifBtn').textContent=t('notif.btn');
  }else{nb.style.display='none';}
}

function renderTabs(){
  const tc=document.getElementById('tabs');
  const tabs=[{id:'checklist',k:'tab.checklist'},{id:'review',k:'tab.review'},{id:'history',k:'tab.history'}];
  tc.innerHTML=tabs.map(tb=>`<button class="${activeTab===tb.id?'on':''}" onclick="switchTab('${tb.id}')">${t(tb.k)}</button>`).join('');
}

function switchTab(id){activeTab=id;renderTabs();renderPanel();}

function renderPanel(){
  const pc=document.getElementById('panelContent');
  if(activeTab==='checklist')pc.innerHTML=renderChecklist();
  else if(activeTab==='review')pc.innerHTML=renderReview();
  else pc.innerHTML=renderHistory();
  wireInputs();
}

function renderChecklist(){
  const areaBtns=AREAS.map(a=>
    `<button class="${activeArea===a?'on':''}" onclick="switchArea('${a}')">${ICONS[a]} ${t('area.'+a+'.title')}</button>`
  ).join('');
  const a=activeArea;
  // prediction: writeable on Mon (DOW===1) or Sun (DOW===0 = catch-up)
  // feedback: writeable on Sat (DOW===6) or Sun (DOW===0)
  const predReadonly=DOW!==1&&DOW!==0;
  const fbReadonly=DOW!==6&&DOW!==0;
  const fields=[
    {key:'prediction',label:t('field.prediction'),ro:predReadonly,hint:predReadonly?t('readonly.mon'):''},
    {key:'actions',label:t('field.actions'),ro:false,hint:''},
    {key:'midweek',label:t('field.midweek'),ro:false,hint:''},
    {key:'feedback',label:t('field.feedback'),ro:fbReadonly,hint:fbReadonly?t('readonly.sat'):''},
    {key:'revision',label:t('field.revision'),ro:false,hint:''},
  ];
  const fieldsHtml=fields.map(f=>`
    <div class="field${f.ro?' readonly':''}">
      <label>${f.label}</label>
      <textarea data-area="${a}" data-field="${f.key}"${f.ro?' readonly':''}>${fieldVal(a,f.key)}</textarea>
      ${f.hint?`<div class="help-text">${f.hint}</div>`:''}
    </div>`).join('');
  return`
    <div class="area-btns">${areaBtns}</div>
    <div class="card">
      <div class="area-header">
        <span class="area-icon">${ICONS[a]}</span>
        <div><div class="area-title">${t('area.'+a+'.title')}</div><div class="area-subtitle">${t('area.'+a+'.sub')}</div></div>
      </div>
      <div class="fields">${fieldsHtml}</div>
      <p class="help-text" style="margin-top:10px">${t('help.autosave')}</p>
      <div class="actions-row">
        <button class="btn btn-ghost" onclick="exportWeek()">${t('ui.exportWeek')}</button>
        <button class="btn btn-danger" onclick="clearWeek()">${t('ui.clearWeek')}</button>
      </div>
    </div>`;
}

function switchArea(a){activeArea=a;renderPanel();}

function renderReview(){
  const qs=['review.q1','review.q2','review.q3','review.q4'];
  const qsHtml=qs.map(q=>`
    <div class="review-q">
      <label>${t(q)}</label>
      <textarea data-area="review" data-field="${q}">${fieldVal('review',q)}</textarea>
    </div>`).join('');
  return`<div class="card"><h3 style="margin-bottom:14px;font-size:1.05rem">📝 ${t('tab.review')}</h3>${qsHtml}</div>`;
}

function renderHistory(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('week_')).sort().reverse();
  if(!keys.length)return`<div class="card" style="color:var(--muted)">${t('history.empty')}</div>`;
  return`<div>${keys.map(k=>{
    const d=loadWeek(k);
    const mon=new Date(k.replace('week_',''));
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    const filled=AREAS.filter(a=>d[a]&&Object.values(d[a]).some(v=>String(v).trim())).length;
    const isCur=k===WKEY;
    return`<div class="hist-item${isCur?' current':''}">
      <div><strong>${fmtDate(mon)} – ${fmtDate(sun)}</strong>${isCur?`<span class="cur-pill">${t('cur.label')}</span>`:''}</div>
      <div style="font-size:.88rem;color:var(--muted)">${filled} / ${AREAS.length} ${t('hist.areas.filled')}</div>
    </div>`;
  }).join('')}</div>`;
}

function wireInputs(){
  document.querySelectorAll('textarea[data-area]').forEach(el=>{
    el.addEventListener('input',()=>setField(el.dataset.area,el.dataset.field,el.value));
  });
}

function clearWeek(){
  if(!confirm(lang==='zh-TW'?'確定要清除本週所有資料嗎？':'Clear all data for this week?'))return;
  weekData={};saveWeek(WKEY,weekData);renderPanel();
}

function exportWeek(){
  const lines=['# '+WKEY.replace('week_','')];
  AREAS.forEach(a=>{
    lines.push('\n## '+t('area.'+a+'.title'));
    ['prediction','actions','midweek','feedback','revision'].forEach(f=>{
      const v=fieldVal(a,f);
      if(v)lines.push('**'+t('field.'+f)+'**\n'+v);
    });
  });
  const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='astro-week-'+WKEY.replace('week_','')+'.md';a.click();
}

async function requestNotifPermission(){
  const perm=await Notification.requestPermission();
  if(perm==='granted')scheduleNotifications();
  renderNotifBar();
}

function scheduleNotifications(){
  const nextMon=new Date(MONDAY);nextMon.setDate(nextMon.getDate()+7);nextMon.setHours(8,0,0,0);
  const toMon=nextMon-Date.now();
  if(toMon>0)setTimeout(()=>new Notification('🌟 '+(lang==='zh-TW'?'週一占星提醒':'Monday Reminder'),{body:lang==='zh-TW'?'記得更新本週預測！':'Time to update this week's predictions!'}),toMon);
  const sat=new Date(MONDAY);sat.setDate(sat.getDate()+5);sat.setHours(20,0,0,0);
  const toSat=sat-Date.now();
  if(toSat>0)setTimeout(()=>new Notification('📝 '+(lang==='zh-TW'?'週六回饋提醒':'Saturday Review'),{body:lang==='zh-TW'?'記得填寫本週回饋！':'Time to fill in your weekly feedback!'}),toSat);
}

if('Notification' in window&&Notification.permission==='granted')scheduleNotifications();
applyLang(lang);
</script>
</body>
