<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 多人占星週報產生器</title>
<style>
:root{--bg:#0d0f14;--card:#13161e;--border:#1e2330;--gold:#f0c040;--gold2:#c8960a;--teal:#4ecdc4;--text:#e8eaf0;--sub:#8892a4;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;line-height:1.6;}
.hero{background:linear-gradient(135deg,#1a1030,#0d1a2a,#1a0d20);padding:32px 20px 24px;text-align:center;border-bottom:1px solid var(--border);}
.hero h1{font-size:1.5rem;background:linear-gradient(90deg,var(--gold),#fff,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.hero p{color:var(--sub);font-size:.82rem;}
.form-wrap{padding:20px;max-width:500px;margin:0 auto;}
.form-title{font-size:.75rem;color:var(--sub);letter-spacing:2px;margin-bottom:12px;}
.form-row{margin-bottom:14px;}
label{display:block;font-size:.82rem;color:var(--sub);margin-bottom:5px;}
input,select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;outline:none;}
input:focus,select:focus{border-color:var(--gold2);}
.btn{width:100%;background:linear-gradient(135deg,var(--gold2),#9b7a00);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:4px;}
.btn:active{opacity:.8;}
#result{display:none;padding:0 20px 40px;max-width:500px;margin:0 auto;}
.result-header{text-align:center;padding:20px 0 14px;}
.result-header h2{font-size:1.2rem;color:var(--gold);margin-bottom:4px;}
.result-header p{color:var(--sub);font-size:.8rem;}
.signs-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0;}
.sign-badge{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.25);border-radius:20px;padding:4px 12px;font-size:.8rem;}
.sec-title{font-size:.72rem;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin:18px 0 8px;}
.scores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 6px;text-align:center;}
.sc .si{font-size:1.2rem;margin-bottom:2px;}
.sc .sn{font-size:.68rem;color:var(--sub);margin-bottom:4px;}
.sc .ss{font-size:.82rem;}
.sc .st{font-size:.65rem;color:var(--sub);margin-top:2px;line-height:1.3;}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:7px;}
.day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.day-name{font-weight:700;font-size:.88rem;}
.day-date{font-size:.72rem;color:var(--sub);}
.day-lv{font-size:.7rem;padding:2px 7px;border-radius:10px;}
.lv-h{background:rgba(46,204,113,.15);color:var(--green);}
.lv-m{background:rgba(240,192,64,.15);color:var(--gold);}
.lv-l{background:rgba(231,76,60,.15);color:var(--red);}
.day-txt{font-size:.8rem;color:var(--sub);line-height:1.55;}
.advice-box{background:rgba(78,205,196,.06);border:1px solid rgba(78,205,196,.2);border-radius:9px;padding:14px;margin-bottom:8px;}
.advice-box h4{font-size:.82rem;color:var(--teal);margin-bottom:6px;}
.advice-box p{font-size:.8rem;color:var(--sub);line-height:1.6;}
.footer-note{text-align:center;color:var(--sub);font-size:.72rem;padding:16px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<div class="hero">
  <h1>🔮 多人占星週報產生器</h1>
  <p>輸入生日，即時生成個人化週運報告</p>
</div>

<div class="form-wrap">
  <div class="form-title">📋 輸入基本資料</div>
  <div class="form-row">
    <label>稱呼（可選）</label>
    <input type="text" id="name" placeholder="例：小明、王老師">
  </div>
  <div class="form-row">
    <label>出生年份 *</label>
    <input type="number" id="byear" placeholder="例：1990" min="1900" max="2010">
  </div>
  <div class="form-row">
    <label>出生月份 *</label>
    <select id="bmonth">
      <option value="">請選擇</option>
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
  </div>
  <div class="form-row">
    <label>出生日期 *</label>
    <input type="number" id="bday" placeholder="例：15" min="1" max="31">
  </div>
  <div class="form-row">
    <label>出生時間（選填，用於計算上升星座）</label>
    <input type="time" id="btime" placeholder="HH:MM">
  </div>
  <div class="form-row">
    <label>出生地點（選填）</label>
    <input type="text" id="bplace" placeholder="例：台北、東京、紐約">
  </div>
  <button class="btn" onclick="generate()">✨ 產生我的週運報告</button>
</div>

<div id="result">
  <div class="result-header">
    <h2 id="r-name">🔮 個人化週運</h2>
    <p>2026年 W3｜4月6日 — 4月12日</p>
  </div>
  <div class="signs-row" id="r-signs"></div>

  <div class="sec-title">📊 九大領域週運</div>
  <div class="scores-grid" id="r-scores"></div>

  <div class="sec-title">📅 每日運勢</div>
  <div id="r-days"></div>

  <div class="sec-title">💡 本週建議</div>
  <div id="r-advice"></div>

  <div class="footer-note">
    🔮 依據蘇珊米勒占星方法 · 參考AstrologyZone · Jean Meeus天文計算<br>
    占星為參考，重大決策請以理性判斷為主
  </div>
</div>

<script>
// 太陽星座計算
function getSunSign(m, d) {
  const signs = [
    [1,20,'摩羯座','♑'],[2,19,'水瓶座','♒'],[3,21,'雙魚座','♓'],[3,21,'牡羊座','♈'],
    [4,20,'金牛座','♉'],[5,21,'雙子座','♊'],[6,21,'巨蟹座','♋'],[7,23,'獅子座','♌'],
    [8,23,'處女座','♍'],[9,23,'天秤座','♎'],[10,23,'天蠍座','♏'],[11,22,'射手座','♐'],
    [12,22,'摩羯座','♑']
  ];
  const dates = [
    {m:1,d:20,s:'水瓶座',e:'♒'},{m:2,d:19,s:'雙魚座',e:'♓'},{m:3,d:21,s:'牡羊座',e:'♈'},
    {m:4,d:20,s:'金牛座',e:'♉'},{m:5,d:21,s:'雙子座',e:'♊'},{m:6,d:21,s:'巨蟹座',e:'♋'},
    {m:7,d:23,s:'獅子座',e:'♌'},{m:8,d:23,s:'處女座',e:'♍'},{m:9,d:23,s:'天秤座',e:'♎'},
    {m:10,d:23,s:'天蠍座',e:'♏'},{m:11,d:22,s:'射手座',e:'♐'},{m:12,d:22,s:'摩羯座',e:'♑'}
  ];
  for(let i=0;i<dates.length;i++){
    if(m===dates[i].m && d>=dates[i].d) return {name:dates[i].s,emoji:dates[i].e};
    if(m===dates[i].m+1 && d<dates[i].d) return {name:dates[i].s,emoji:dates[i].e};
  }
  // 邊界：1月1-19日 摩羯
  if(m===1 && d<20) return {name:'摩羯座',emoji:'♑'};
  if(m===12 && d>=22) return {name:'摩羯座',emoji:'♑'};
  return {name:'未知',emoji:'⭐'};
}

// 上升星座簡易估算（依出生時間）
function getAscSign(h, m_min) {
  const totalMin = h*60+m_min;
  const ascSigns = ['天秤座','天蠍座','射手座','摩羯座','水瓶座','雙魚座',
                    '牡羊座','金牛座','雙子座','巨蟹座','獅子座','處女座'];
  const idx = Math.floor(totalMin/(24*60/12)) % 12;
  return ascSigns[idx];
}

// 週運評分資料庫（依太陽星座）
const weekData = {
  '牡羊座': {
    scores: [5,4,4,3,4,4,5,4,3],
    days: ['平穩整頓','能量充沛','溝通順暢','小心摩擦','觀察思考','展現自信','回顧計畫'],
    advice: '金星本週順行，逆行期積壓的人際關係開始鬆動。4/11-12是本月最佳社交日，主動出擊。'
  },
  '金牛座': {
    scores: [5,5,4,4,4,3,4,5,4],
    days: ['返台調整','效率極高','最佳準備日','深度思考','廣納意見','衝刺關鍵','慶祝自己'],
    advice: '守護星金星4/12順行，你是本週最大受益星座！口試、求職、財務計畫都獲得加持。全力以赴。'
  },
  '雙子座': {
    scores: [4,5,5,3,4,4,4,4,4],
    days: ['思維跳躍','資訊處理強','表達最佳','稍事休息','整合想法','溝通順暢','輕鬆收尾'],
    advice: '木星在你的星座，2026年是雙子的黃金年！本週水星牡羊加持，溝通表達無往不利。'
  },
  '巨蟹座': {
    scores: [3,4,3,5,5,3,4,5,5],
    days: ['保護自己','慢慢展開','情緒敏感','家庭優先','直覺最強','謹慎評估','靜心整理'],
    advice: '火星在巨蟹，內心能量強大。家人關係是本週重點，先照顧好自己才能照顧他人。'
  },
  '獅子座': {
    scores: [4,3,4,4,3,5,5,4,4],
    days: ['慢熱醞釀','整理方向','社交活躍','調整步伐','重新聚焦','閃耀時刻','享受關注'],
    advice: '太陽移向金牛後，獅子的能量趨向穩定。本週適合展現成果、與人分享成就。'
  },
  '處女座': {
    scores: [5,5,3,4,5,4,4,5,5],
    days: ['細節處理','分析完美','注意休息','服務他人','效率衝刺','謹慎出行','整理完成'],
    advice: '土星在雙魚（你的對宮）提醒平衡付出與接受。上升處女的人本週特別重視完美，學會適當放鬆。'
  },
  '天秤座': {
    scores: [4,4,5,5,3,4,5,4,4],
    days: ['優雅開展','審美最佳','人際高峰','協調關係','稍事休息','美麗顯現','和諧收尾'],
    advice: '金星（你的守護星）4/12順行，天秤迎來能量解凍！感情、美學計畫、人際往來全面好轉。'
  },
  '天蠍座': {
    scores: [3,4,4,4,5,3,4,5,4],
    days: ['深度調查','財務整理','變革意識','情感深化','直覺最準','謹慎行動','洞察完成'],
    advice: '月亮本週初經過天蠍，你的直覺力超強。善用敏銳洞察力，週三後進入更務實的摩羯能量。'
  },
  '射手座': {
    scores: [4,3,4,3,5,4,5,5,5],
    days: ['哲思模式','學習閱讀','探索想法','整理信念','自由奔放','冒險嘗試','樂觀收週'],
    advice: '木星（守護星）在雙子，與你形成對分。2026上半年是擴展視野的好時機，旅遊與學習帶來啟發。'
  },
  '摩羯座': {
    scores: [5,4,4,3,5,3,4,4,5],
    days: ['踏實執行','目標清晰','努力衝刺','注意壓力','重要判斷','展現成果','穩健收尾'],
    advice: '月亮本週三四在摩羯，你的精神狀態回到最佳！土星持續在雙魚，提醒保持身心靈的平衡。'
  },
  '水瓶座': {
    scores: [4,5,4,4,4,5,4,4,4],
    days: ['創新醞釀','人脈拓展','技術突破','個人反思','理性分析','社群連結','自由探索'],
    advice: '冥王星入水瓶（長期），你的人生正在深層變革。本週水星牡羊帶來行動力，把想法付諸實踐。'
  },
  '雙魚座': {
    scores: [3,4,3,5,4,4,4,5,5],
    days: ['靈感湧現','保護邊界','藝術創作','心靈連結','直覺清晰','溫和展現','夢境豐富'],
    advice: '土星在你的星座已近尾聲，2026年是雙魚的重要轉型期。靈性修行與服務他人是你的最高召喚。'
  }
};

const weekDays = ['一','二','三','四','五','六','日'];
const weekDates = ['4/6','4/7','4/8','4/9','4/10','4/11','4/12'];
const domainNames = ['事業求職','學習考試','財務理財','感情人際','家庭母親','健康身體','旅行交通','心靈修行','志工服務'];
const domainIcons = ['💼','📚','💰','❤️','🏠','💪','✈️','🧘','🌱'];
const dayLevels = ['med','med','high','high','med','high','high'];
const dayLevelText = ['平穩','平穩','幸運','幸運','調整','重要','關鍵'];

function starsHTML(n){
  return '⭐'.repeat(n) + (n<5?'<span style="opacity:.25">'+'⭐'.repeat(5-n)+'</span>':'');
}

function generate(){
  const year = parseInt(document.getElementById('byear').value);
  const month = parseInt(document.getElementById('bmonth').value);
  const day = parseInt(document.getElementById('bday').value);
  const name = document.getElementById('name').value.trim();
  const timeVal = document.getElementById('btime').value;
  const place = document.getElementById('bplace').value.trim();

  if(!year||!month||!day){alert('請填入出生年、月、日！');return;}
  if(year<1900||year>2010){alert('請輸入正確的出生年份（1900-2010）');return;}

  const sun = getSunSign(month, day);
  let ascStr = '';
  if(timeVal){
    const [hh,mm] = timeVal.split(':').map(Number);
    ascStr = getAscSign(hh,mm);
  }

  const data = weekData[sun.name] || weekData['金牛座'];

  // 名字
  const displayName = name ? name+'的' : '';
  document.getElementById('r-name').textContent = '🔮 '+displayName+'個人化週運';

  // 星座徽章
  let signsHTML = `<div class="sign-badge">☀️ 太陽 ${sun.emoji} ${sun.name}</div>`;
  if(ascStr) signsHTML += `<div class="sign-badge">⬆️ 上升 ${ascStr}</div>`;
  signsHTML += `<div class="sign-badge">🎂 ${year}/${month}/${day}</div>`;
  if(place) signsHTML += `<div class="sign-badge">📍 ${place}</div>`;
  document.getElementById('r-signs').innerHTML = signsHTML;

  // 評分
  let scoresHTML = '';
  data.scores.forEach((s,i)=>{
    scoresHTML += `<div class="sc"><div class="si">${domainIcons[i]}</div><div class="sn">${domainNames[i]}</div><div class="ss">${starsHTML(s)}</div></div>`;
  });
  document.getElementById('r-scores').innerHTML = scoresHTML;

  // 每日
  let daysHTML = '';
  weekDays.forEach((wd,i)=>{
    daysHTML += `<div class="day-card">
      <div class="day-top">
        <div><span class="day-name">週${wd}</span> <span class="day-date">${weekDates[i]}</span></div>
        <span class="day-lv lv-${dayLevels[i]}">${dayLevelText[i]}</span>
      </div>
      <div class="day-txt">${data.days[i] || '保持平衡，觀察局勢。'}</div>
    </div>`;
  });
  document.getElementById('r-days').innerHTML = daysHTML;

  // 建議
  document.getElementById('r-advice').innerHTML = `<div class="advice-box"><h4>✨ ${sun.name}本週重點</h4><p>${data.advice}</p></div>`;

  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
